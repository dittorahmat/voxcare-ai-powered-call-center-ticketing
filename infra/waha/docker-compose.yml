# WAHA (WhatsApp HTTP API) Docker Compose
# Deploy this on a VPS for WhatsApp integration with VoxCare.
#
# Setup:
# 1. Copy this file to your VPS
# 2. Run: docker compose up -d
# 3. Open http://YOUR_VPS_IP:3000/api/auth/qr to scan QR code
# 4. Set WAHA_URL and WAHA_API_KEY in VoxCare wrangler.jsonc

version: '3.8'

services:
  waha:
    image: devlikeapro/waha:latest
    container_name: waha
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - API_KEY=waha-secret-key-change-me
      - WAHA_DASHBOARD_ENABLED=true
    volumes:
      - waha-sessions:/app/sessions
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/sessions"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  waha-sessions:
    driver: local
